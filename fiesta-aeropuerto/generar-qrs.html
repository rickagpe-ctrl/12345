<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generar QRs de invitados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
  h1 { margin-bottom: 0.5rem; }
  .instruccion { color: #666; margin-bottom: 2rem; }
  input { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; width: 400px; margin-right: 10px; }
  button { padding: 10px 20px; background: #6C63FF; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  .card { background: white; border-radius: 16px; padding: 1.5rem; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card h3 { margin: 1rem 0 0.3rem; font-size: 1rem; }
  .card p { color: #888; font-size: 0.8rem; }
  .avatar { width: 50px; height: 50px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 1.1rem; margin-bottom: 0.5rem; }
  #qr-area div { display: inline-block; }
  @media print { button, input, h1, .instruccion { display: none; } .grid { gap: 0.5rem; } }
</style>
</head>
<body>
<h1>✈️ Generador de QRs — Fiesta Aeropuerto</h1>
<p class="instruccion">Ingresa la URL de tu app en Glitch y haz clic en "Generar". Luego imprime esta página.</p>
<div style="margin-bottom:1rem">
  <input type="text" id="baseUrl" placeholder="https://TU-PROYECTO.glitch.me" value="https://TU-PROYECTO.glitch.me">
  <button onclick="generate()">Generar QRs</button>
</div>
<div class="grid" id="qr-area"></div>
<script>
const guests = [
  { id:"g01", name:"Ana García",       emoji:"🎉", color:"#6C63FF" },
  { id:"g02", name:"Carlos López",     emoji:"✈️",  color:"#FF6584" },
  { id:"g03", name:"María Rodríguez",  emoji:"🌟",  color:"#43B89C" },
  { id:"g04", name:"José Martínez",    emoji:"🎊",  color:"#F5A623" },
  { id:"g05", name:"Laura Hernández",  emoji:"💫",  color:"#E91E8C" },
  { id:"g06", name:"Miguel Torres",    emoji:"🚀",  color:"#00BCD4" },
  { id:"g07", name:"Sofía Ramírez",    emoji:"🌈",  color:"#9C27B0" },
  { id:"g08", name:"Diego Flores",     emoji:"⭐",  color:"#FF5722" },
  { id:"g09", name:"Valentina Cruz",   emoji:"🎵",  color:"#4CAF50" },
  { id:"g10", name:"Andrés Morales",   emoji:"🎯",  color:"#2196F3" },
  { id:"g11", name:"Isabella Jiménez", emoji:"🦋",  color:"#FF9800" },
  { id:"g12", name:"Sebastián Ruiz",   emoji:"🌺",  color:"#E91E63" },
  { id:"g13", name:"Camila Díaz",      emoji:"🎸",  color:"#009688" },
  { id:"g14", name:"Mateo Vargas",     emoji:"🏆",  color:"#673AB7" },
  { id:"g15", name:"Daniela Castro",   emoji:"🌸",  color:"#F44336" },
  { id:"g16", name:"Samuel Romero",    emoji:"⚡",  color:"#3F51B5" },
  { id:"g17", name:"Natalia Medina",   emoji:"🎀",  color:"#00BCD4" },
  { id:"g18", name:"Lucas Guerrero",   emoji:"🔥",  color:"#FF6F00" },
  { id:"g19", name:"Gabriela Ortiz",   emoji:"💎",  color:"#7B1FA2" },
  { id:"g20", name:"Emilio Reyes",     emoji:"🎭",  color:"#1976D2" },
  { id:"g21", name:"Valeria Moreno",   emoji:"🌻",  color:"#388E3C" },
  { id:"g22", name:"Alejandro Silva",  emoji:"🎪",  color:"#C62828" },
  { id:"g23", name:"Mariana Núñez",    emoji:"🌙",  color:"#AD1457" },
  { id:"g24", name:"Rodrigo Pérez",    emoji:"🎮",  color:"#0288D1" },
  { id:"g25", name:"Fernanda Soto",    emoji:"🦄",  color:"#6A1B9A" },
];
function initials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function generate() {
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  const area = document.getElementById('qr-area');
  area.innerHTML = '';
  guests.forEach(g => {
    const url = base + '/checkin/' + g.id;
    const card = document.createElement('div');
    card.className = 'card';
    const avEl = document.createElement('div');
    avEl.className = 'avatar';
    avEl.style.background = g.color;
    avEl.textContent = initials(g.name);
    const qrDiv = document.createElement('div');
    qrDiv.id = 'qr-'+g.id;
    const name = document.createElement('h3');
    name.textContent = g.emoji + ' ' + g.name;
    const sub = document.createElement('p');
    sub.textContent = url;
    card.append(avEl, qrDiv, name, sub);
    area.appendChild(card);
    new QRCode(qrDiv, { text: url, width: 150, height: 150, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.H });
  });
}
</script>
</body>
</html>
