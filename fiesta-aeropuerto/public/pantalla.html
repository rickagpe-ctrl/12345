<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel de llegadas</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
.header-title { color: white; font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
.header-title span { font-size: 1.8rem; }
.counter { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 8px 20px; color: white; font-size: 0.9rem; }
.counter strong { font-size: 1.3rem; }
.spotlight { padding: 2rem; text-align: center; min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
.spotlight-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem; }
.spotlight-avatar { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; color: white; margin: 0 auto 1rem; border: 3px solid rgba(255,255,255,0.2); object-fit: cover; }
.spotlight-name { color: white; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; }
.spotlight-emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
.spotlight-time { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
.waiting { color: rgba(255,255,255,0.25); font-size: 1.1rem; padding: 3rem; }
.arrivals-section { padding: 1.5rem 2rem; }
.section-label { color: rgba(255,255,255,0.35); font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1rem; }
.arrivals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
.arrival-card { display: flex; flex-direction: column; align-items: center; gap: 6px; animation: popIn 0.4s ease; }
@keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
.arrival-avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: white; border: 2px solid rgba(255,255,255,0.15); object-fit: cover; }
.arrival-name { color: rgba(255,255,255,0.7); font-size: 0.65rem; text-align: center; line-height: 1.2; max-width: 90px; }
.arrival-time { color: rgba(255,255,255,0.35); font-size: 0.6rem; }
.notification { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 999; background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.4s ease; max-width: 320px; }
.notification.show { transform: translateX(0); }
.notif-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; flex-shrink: 0; font-size: 1.1rem; object-fit: cover; }
.notif-text strong { color: white; display: block; font-size: 0.95rem; }
.notif-text span { color: rgba(255,255,255,0.55); font-size: 0.8rem; }
.progress-bar { height: 3px; background: rgba(255,255,255,0.06); margin: 0 2rem; border-radius: 2px; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; background: linear-gradient(90deg, #6C63FF, #FF6584); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); } 50% { box-shadow: 0 0 0 20px rgba(255,255,255,0); } }
.pulse { animation: pulse 1.5s ease 3; }
</style>
</head>
<body>
<div class="header">
  <div class="header-title"><span>✈️</span> Panel de llegadas</div>
  <div class="counter"><strong id="count">0</strong> / 25 invitados</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="spotlight" id="spotlight">
  <p class="waiting">✈️ Esperando primeras llegadas…</p>
</div>
<div class="arrivals-section">
  <div class="section-label">Todos los que han llegado</div>
  <div class="arrivals-grid" id="grid"></div>
</div>
<div class="notification" id="notif">
  <div id="notif-avatar"></div>
  <div class="notif-text">
    <strong id="notif-name"></strong>
    <span>acaba de llegar 🎉</span>
  </div>
</div>
<script>
const socket = io();
const TOTAL = 25;

function initials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

function avatarEl(guest, size, extraStyle='') {
  if (guest.photo) {
    return `<img src="${guest.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.2);${extraStyle}" alt="${guest.name}">`;
  }
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${guest.color};display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:${size*0.3}px;border:2px solid rgba(255,255,255,0.15);${extraStyle}">${initials(guest.name)}</div>`;
}

function updateSpotlight(guest) {
  document.getElementById('spotlight').innerHTML = `
    <p class="spotlight-label">Última llegada</p>
    <div class="pulse" style="border-radius:50%;box-shadow:0 0 60px ${guest.color}66;margin:0 auto 1rem;">
      ${avatarEl(guest, 140, `border:3px solid rgba(255,255,255,0.2);`)}
    </div>
    <span class="spotlight-emoji">${guest.emoji}</span>
    <p class="spotlight-name">${guest.name}</p>
    <p class="spotlight-time">Llegó a las ${guest.time}</p>`;
}

function addToGrid(guest) {
  const card = document.createElement('div');
  card.className = 'arrival-card';
  card.innerHTML = `${avatarEl(guest, 64)}<div class="arrival-name">${guest.name.split(' ')[0]}</div><div class="arrival-time">${guest.time}</div>`;
  document.getElementById('grid').prepend(card);
}

function showNotif(guest) {
  const notif = document.getElementById('notif');
  document.getElementById('notif-avatar').innerHTML = avatarEl(guest, 52);
  document.getElementById('notif-name').textContent = guest.name;
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 3500);
}

function updateCounter(count) {
  document.getElementById('count').textContent = count;
  document.getElementById('progress').style.width = (count/TOTAL*100)+'%';
}

fetch('/api/arrivals').then(r=>r.json()).then(arrivals => {
  arrivals.reverse().forEach(addToGrid);
  if (arrivals.length) updateSpotlight(arrivals[0]);
  updateCounter(arrivals.length);
});

socket.on('new_arrival', (guest) => {
  addToGrid(guest);
  updateSpotlight(guest);
  showNotif(guest);
  fetch('/api/arrivals').then(r=>r.json()).then(a=>updateCounter(a.length));
});
</script>
</body>
</html>
